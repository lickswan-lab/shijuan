name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Push tag like v1.2.5 to trigger
  workflow_dispatch:  # Manual trigger from GitHub Actions page

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx electron-vite build

      # 1. electron-packager path (produces raw-dir zip and extracts app.asar for patch updates)
      - run: npx electron-packager . "拾卷" --platform=win32 --arch=x64 --out=dist-packager --icon=build/icon.ico --asar --overwrite
      - name: Zip Windows build (packager)
        run: Compress-Archive -Path "dist-packager\拾卷-win32-x64\*" -DestinationPath "dist-packager\shijuan-win-x64.zip"
        shell: pwsh
      - name: Copy app.asar for patch update
        run: Copy-Item "dist-packager\拾卷-win32-x64\resources\app.asar" "dist-packager\app.asar"
        shell: pwsh

      # 2. electron-builder path (produces NSIS installer + portable exe)
      - name: Build NSIS installer + portable
        run: npx electron-builder --win nsis portable --x64 --publish never
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Rename to ASCII-only so GitHub artifact upload (which munges unicode in
      # filenames) produces clean shijuan-win-x64-*.exe assets on the release.
      # Without this step we get junk like "Setup.1.3.0-beta.exe" and
      # "-1.3.0-beta-.exe" because the Chinese chars get stripped mid-glob.
      - name: Normalize Windows artifact names
        run: |
          $setup = Get-ChildItem dist -Filter "*Setup*.exe" | Select-Object -First 1
          $portable = Get-ChildItem dist -Filter "*便携版*.exe" | Select-Object -First 1
          if ($setup) { Rename-Item $setup.FullName "shijuan-win-x64-setup.exe" }
          if ($portable) { Rename-Item $portable.FullName "shijuan-win-x64-portable.exe" }
          Get-ChildItem dist -Filter "*.exe" | Format-Table Name, Length
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: shijuan-win-x64
          path: dist-packager/shijuan-win-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: shijuan-app-asar
          path: dist-packager/app.asar
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: shijuan-win-setup
          path: dist/shijuan-win-x64-setup.exe
      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: shijuan-win-portable
          path: dist/shijuan-win-x64-portable.exe

  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx electron-vite build
      - run: npx electron-packager . "拾卷" --platform=darwin --arch=x64 --out=dist --icon=build/icon.png --asar --overwrite
      - name: Zip macOS Intel build
        run: cd dist && zip -r -y shijuan-mac-x64.zip "拾卷-darwin-x64"
      - uses: actions/upload-artifact@v4
        with:
          name: shijuan-mac-x64
          path: dist/shijuan-mac-x64.zip

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx electron-vite build
      - run: npx electron-packager . "拾卷" --platform=darwin --arch=arm64 --out=dist --icon=build/icon.png --asar --overwrite
      - name: Zip macOS ARM build
        run: cd dist && zip -r -y shijuan-mac-arm64.zip "拾卷-darwin-arm64"
      - uses: actions/upload-artifact@v4
        with:
          name: shijuan-mac-arm64
          path: dist/shijuan-mac-arm64.zip

  release:
    needs: [build-windows, build-macos-intel, build-macos-arm]
    # Artifacts uploaded from build jobs are consumed here by softprops/action-gh-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 拾卷 ${{ github.ref_name }}
          draft: false
          files: |
            artifacts/shijuan-win-x64/shijuan-win-x64.zip
            artifacts/shijuan-win-setup/*.exe
            artifacts/shijuan-win-portable/*.exe
            artifacts/shijuan-mac-x64/shijuan-mac-x64.zip
            artifacts/shijuan-mac-arm64/shijuan-mac-arm64.zip
            artifacts/shijuan-app-asar/app.asar
